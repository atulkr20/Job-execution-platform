version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jepuser
      POSTGRES_PASSWORD: jeppassword
      POSTGRES_DB: job_execution_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jepuser -d job_execution_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jep-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: